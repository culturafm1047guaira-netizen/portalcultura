name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Unit Tests
        run: npm run test:unit -- --passWithNoTests
      
      - name: Run Integration Tests
        run: npm run test:integration -- --passWithNoTests
      
      - name: Run E2E Tests
        run: npx playwright install --with-deps chromium && npm run test:e2e
        if: github.event_name == 'pull_request'

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify project structure
        run: |
          ls -la
          test -f vercel.json || exit 1
          test -f package.json || exit 1
          test -f index.html || exit 1
      
      - name: Validate vercel.json
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json'))"
      
      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          node -e "JSON.parse(require('fs').readFileSync('api/news.js'))"
      
      - name: Vercel CLI install
        run: npm i -g vercel@latest
      
      - name: Vercel Production Deploy
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Vercel CLI install
        run: npm i -g vercel@latest
      
      - name: Vercel Preview
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build project
        run: vercel build --yes --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy Preview
        run: vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }}